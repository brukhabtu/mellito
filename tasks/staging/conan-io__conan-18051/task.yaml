description: |
  [bug] XCode 16.3 apple-clang 17 support is missing
  ### Describe the bug
  
  MacOSX 15.3.2, XCode 16.3, Conan 2.15.0
  
  [settings]
  arch=armv8
  build_type=Release
  compiler=apple-clang
  compiler.cppstd=gnu17
  compiler.libcxx=libc++
  compiler.version=17
  os=Macos
  
  ### How to reproduce it
  
  1. Update XCode to the newest 16.3
  2. Start conan install . --build
  3. An error received:
  
  ERROR: Invalid setting '17' is not a valid 'settings.compiler.version' value.
  Possible values are ['5.0', '5.1', '6.0', '6.1', '7.0', '7.3', '8.0', '8.1', '9.0', '9.1', '10.0', '11.0', '12.0', '13', '13.0', '13.1', '14', '14.0', '15', '15.0', '16', '16.0']
