  ### 🔎 Describe the Bug
  
  Token usage data (prompt_tokens, completion_tokens, total_tokens) is not being consistently extracted across different OpenAI API endpoints. While some endpoints correctly capture token usage, others are missing this critical data.
  
  Current Behavior
  Working Correctly:
  - Chat Completions (non-streaming): Properly extracts all token usage
  - Embeddings: Correctly captures prompt_tokens and total_tokens
  - Responses API: Properly extracts all token usage
  
  Not Working :
  - Streaming Chat Completions
  - Image Generation
  - Assistants API
  
  [Example script](https://gist.github.com/Dwij1704/f4b3a9c1d34f3a956d0abfd7b7dffe39)
  
  ### 🤝 Contribution
  
