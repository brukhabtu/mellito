description: |
  [question] confusing log: conan tries to connect to remote anonymously
  ### What is your question?
  
  Hi,
  
  I'm slightly confused by output of conan during conan remote login call.
  
  I'm doing it like this:
  ```
  conan remote remove "*"
  conan remote add my_remote_name https://my_remote_url
  conan remote login -p my_token my_remote_name my_username
  ```
  
  The output that I see from last command is:
  ```
  Connecting to remote 'my_remote_name' anonymously
  Authenticated in remote 'my_remote_name' with user 'my_username'
  Changed user of remote 'my_remote_name' from 'None' (anonymous) to 'my_username' (authenticated)
  ```
  
  If I do the same command again:
  ```
  Connecting to remote 'my_remote_name' with user 'my_username'
  Authenticated in remote 'my_remote_name' with user 'my_username'
  Changed user of remote 'my_remote_name' from 'my_username' (authenticated) to 'my_username' (authenticated)
  ```
  
  For me personally it's confusing to see first line "Connecting to remote 'my_remote_name' anonymously" when I'm providing token and username. Do I understand correctly that it just shows previous username here if it was present in local database? And actually there is no anonymous connection to server?
  
