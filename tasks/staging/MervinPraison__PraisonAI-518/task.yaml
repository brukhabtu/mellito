description: |
  How to reset task context while running workflow
  Hello,
  I have a workflow where a sequence of tasks are called repeatedly in a loop until a decision task decides to terminate the process:
  [task 1] -> [task 2] -> [decision task] -> repeat [task 2] or terminate process
  
  I have a problem with context length exceeding the allowed limit.
  After taking a look at the instructions, I noticed that the message "input data from previous tasks" followed by task results was getting appended to the context for every cycle.
  In other words, task results from previous cycles gets appended to the context every time the task is executed.
  
  In order to reduce the context length, I wanted to pass only the most recent task results.
  Is there a way to either reset the context for the agent/task every time the process loops or limit the context count?
