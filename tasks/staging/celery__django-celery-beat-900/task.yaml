description: |
  REGEXP_LIKE incompatible with SQL Server
  There's a single use of __regex filter introduced in https://github.com/celery/django-celery-beat/commit/87c059706506994f677e82426c80028ad9894af1 which breaks celery-beat when using SQL Server. 
  * #879
  
  https://learn.microsoft.com/en-us/sql/t-sql/functions/regexp-like-transact-sql?view=azuresqldb-current states that COMPATIBILITY_LEVEL 170 is required for that function to work. That level is not available (at least not for most versions)!
  
